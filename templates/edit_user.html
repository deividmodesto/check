{% extends 'base.html' %}

{% block title %}Editar Utilizador{% endblock %}

{% block content %}
<div style="margin-bottom: 30px;">
    <h2 class="page-title"><i class="fa-solid fa-user-pen" style="margin-right: 10px;"></i> Editar Utilizador</h2>
    <p style="color: var(--cor-texto-mutado);">Altere as informações e as permissões de <strong>{{ user.NomeUsuario }}</strong>.</p>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('edit_user', user_id=user.ID) }}">
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="username"><i class="fa-regular fa-user"></i> Nome de Utilizador</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ user.NomeUsuario }}" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="role"><i class="fa-solid fa-id-badge"></i> Papel do Utilizador</label>
            <select id="role" name="role" class="form-control" onchange="toggleCoordinatorSelect()">
                <option value="COLABORADOR" {% if user.Papel == 'COLABORADOR' %}selected{% endif %}>Colaborador</option>
                <option value="COORDENADOR" {% if user.Papel == 'COORDENADOR' %}selected{% endif %}>Coordenador</option>
                <option value="GESTOR" {% if user.Papel == 'GESTOR' %}selected{% endif %}>Gestor</option>
            </select>
        </div>

        <div class="form-group" id="coordinator-group" style="margin-bottom: 30px; background: #f9fbfb; padding: 15px; border-radius: 8px; border: 1px solid var(--cor-borda);">
            <label for="coordinator_id"><i class="fa-solid fa-network-wired"></i> Associar ao Coordenador</label>
            <select id="coordinator_id" name="coordinator_id" class="form-control">
                <option value="">-- Nenhum --</option>
                {% for coord in coordinators %}
                    <option value="{{ coord.ID }}" {% if user.CoordenadorID == coord.ID %}selected{% endif %}>
                        {{ coord.NomeUsuario }}
                    </option>
                {% endfor %}
            </select>
            <p style="font-size: 0.8rem; color: var(--cor-texto-mutado); margin-top: 5px;">Apenas aplicável se o utilizador for um Colaborador.</p>
        </div>

        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> Guardar Alterações</button>
            <a href="{{ url_for('manage_users') }}" class="btn-primary" style="background-color: #95a5a6; text-decoration: none;"><i class="fa-solid fa-xmark"></i> Cancelar</a>
        </div>
    </form>
</div>

<script>
    function toggleCoordinatorSelect() {
        const roleSelect = document.getElementById('role');
        const coordinatorGroup = document.getElementById('coordinator-group');
        if (roleSelect.value === 'COLABORADOR') {
            coordinatorGroup.style.display = 'block';
        } else {
            coordinatorGroup.style.display = 'none';
        }
    }
    document.addEventListener('DOMContentLoaded', toggleCoordinatorSelect);
</script>
{% endblock %}
